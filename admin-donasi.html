<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Admin Donasi</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial;
}

body{
background:#08110c;
color:white;
padding:20px;
}

.container{
max-width:900px;
margin:auto;
}

.card{
background:#0f1d15;
padding:20px;
border-radius:20px;
margin-bottom:20px;
border:1px solid rgba(255,255,255,0.08);
}

h1{
margin-bottom:20px;
}

input, textarea{

width:100%;
padding:14px;
margin-top:10px;
margin-bottom:15px;
border:none;
border-radius:12px;
background:#16251d;
color:white;
}

button{
padding:12px 18px;
border:none;
border-radius:12px;
background:#16a34a;
color:white;
font-weight:bold;
cursor:pointer;
}

.berita-item{

padding:15px;
border-radius:16px;
background:#16251d;
margin-top:15px;
}

.berita-item h3{
margin-bottom:10px;
}

.delete-btn{
margin-top:10px;
background:#dc2626;
}

</style>
</head>

<body>

<div class="container">

<h1>Kelola Donasi</h1>

<div class="card">

<h2>Tambah </h2>

<input type="text" placeholder="Bank">

<input type="text" placeholder="Nomor rekening">

<input type="text" placeholder="Atas nama">
</div>

<div class="card">

<h2>Daftar </h2>

<div id="ProgramList"></div>

</div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

import {

getFirestore,
collection,
addDoc,
getDocs,
deleteDoc,
doc

} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {

apiKey: "AIzaSyCXxgO0OU9k-LvRhYY7bIuhvVpY5XgMWdk",

authDomain: "nuralam-90162.firebaseapp.com",

projectId: "nuralam-90162",

storageBucket: "nuralam-90162.firebasestorage.app",

messagingSenderId: "371833786531",

appId: "1:371833786531:web:fc49153e527ac617612f16"

};

const app = initializeApp(firebaseConfig);

const db = getFirestore(app);

const saveBtn = document.getElementById("saveBtn");

const beritaList = document.getElementById("beritaList");

async function loadBerita(){

beritaList.innerHTML = "";

const querySnapshot = await getDocs(collection(db, "berita"));

querySnapshot.forEach((docSnap)=>{

const data = docSnap.data();

const div = document.createElement("div");

div.classList.add("berita-item");

div.innerHTML = `

<h3>${data.judul}</h3>

<p>${data.isi}</p>

<button class="delete-btn" data-id="${docSnap.id}">
Hapus
</button>

`;

beritaList.appendChild(div);

});

document.querySelectorAll(".delete-btn").forEach((btn)=>{

btn.addEventListener("click", async ()=>{

const id = btn.getAttribute("data-id");

await deleteDoc(doc(db, "berita", id));

loadBerita();

});

});

}

saveBtn.addEventListener("click", async ()=>{

const judul = document.getElementById("judul").value;

const isi = document.getElementById("isi").value;

if(judul==="" || isi===""){

alert("Isi semua field");

return;

}

await addDoc(collection(db, "berita"), {

judul: judul,
isi: isi,
tanggal: new Date()

});

alert("Ppdb berhasil disimpan");

document.getElementById("judul").value = "";

document.getElementById("isi").value = "";

loadBerita();

});

loadBerita();

</script>

</body>
</html>
