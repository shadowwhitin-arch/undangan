<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="icon" type="image/png" href="logo.png">
  <title>Login Admin</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: Arial, Helvetica, sans-serif;
    }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background:
        radial-gradient(circle at top, rgba(34, 197, 94, 0.16), transparent 35%),
        linear-gradient(180deg, #07110b, #0b1710);
      color: #fff;
      padding: 20px;
    }

    .card {
      width: 100%;
      max-width: 420px;
      background: rgba(10, 20, 14, 0.92);
      border: 1px solid rgba(34, 197, 94, 0.18);
      border-radius: 24px;
      padding: 28px;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.35);
      backdrop-filter: blur(10px);
    }

   .logo{
  width:72px;
  height:72px;
  object-fit:contain;
  margin-bottom:18px;
  background:transparent;
  border:none;
  box-shadow:none;
}

    h1 {
      font-size: 28px;
      margin-bottom: 8px;
      color: #eaf7ef;
    }

    p {
      color: #a7b7ad;
      line-height: 1.5;
      margin-bottom: 24px;
      font-size: 14px;
    }

    .input-group {
      margin-bottom: 16px;
    }

    label {
      display: block;
      margin-bottom: 8px;
      font-size: 14px;
      color: #cfe7d7;
    }

    input {
      width: 100%;
      padding: 14px 16px;
      border-radius: 14px;
      border: 1px solid rgba(255, 255, 255, 0.08);
      outline: none;
      background: #0f1d15;
      color: #fff;
      transition: 0.2s ease;
    }

    input:focus {
      border-color: #22c55e;
      box-shadow: 0 0 0 3px rgba(34, 197, 94, 0.15);
    }

    button {
      width: 100%;
      padding: 14px 16px;
      border: none;
      border-radius: 14px;
      background: linear-gradient(135deg, #16a34a, #15803d);
      color: white;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
      margin-top: 8px;
      transition: transform 0.15s ease, opacity 0.15s ease;
    }

    button:hover {
      transform: translateY(-1px);
      opacity: 0.96;
    }

    .note {
      margin-top: 16px;
      font-size: 13px;
      color: #9fb4a9;
      text-align: center;
    }

    .error {
      display: none;
      margin-top: 12px;
      padding: 12px 14px;
      background: rgba(239, 68, 68, 0.12);
      border: 1px solid rgba(239, 68, 68, 0.25);
      color: #ffb4b4;
      border-radius: 12px;
      font-size: 13px;
    }

    .success {
      display: none;
      margin-top: 12px;
      padding: 12px 14px;
      background: rgba(34, 197, 94, 0.12);
      border: 1px solid rgba(34, 197, 94, 0.25);
      color: #b8f7c9;
      border-radius: 12px;
      font-size: 13px;
    }
  </style>
</head>
<body>
  <div class="card">
   <img src="logo.png" class="logo">
    <h1>Login Admin</h1>
    

    <form id="loginForm">
      <div class="input-group">
        <label for="email">Email Admin</label>
        <input type="email" id="email" placeholder="admin@email.com" required />
      </div>

      <div class="input-group">
        <label for="password">Password</label>
        <input type="password" id="password" placeholder="Masukkan password" required />
      </div>

      <button type="submit">Masuk</button>

      <div class="error" id="errorBox"></div>
      <div class="success" id="successBox"></div>
    </form>

   
  </div>

  <script type="module" src="firebase.js"></script>
  <script type="module">
    const form = document.getElementById("loginForm");
    const emailInput = document.getElementById("email");
    const passwordInput = document.getElementById("password");
    const errorBox = document.getElementById("errorBox");
    const successBox = document.getElementById("successBox");

    firebaseOnAuthStateChanged(firebaseAuth, (user) => {
      if (user) {
        window.location.href = "dashboard.html";
      }
    });

    form.addEventListener("submit", async (e) => {
      e.preventDefault();
      errorBox.style.display = "none";
      successBox.style.display = "none";

      const email = emailInput.value.trim();
      const password = passwordInput.value.trim();

      try {
        await firebaseSignIn(firebaseAuth, email, password);
        successBox.textContent = "Login berhasil. Mengarahkan ke dashboard...";
        successBox.style.display = "block";
        setTimeout(() => {
          window.location.href = "dashboard.html";
        }, 700);
      } catch (error) {
        errorBox.textContent = "Login gagal: " + error.message;
        errorBox.style.display = "block";
      }
    });
  </script>
</body>
</html>
