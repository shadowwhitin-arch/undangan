<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin Konten Pondok</title>

  <style>
    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family:Arial, sans-serif;
    }

    body{
      background:
        radial-gradient(circle at top, rgba(22,163,74,.18), transparent 28%),
        linear-gradient(180deg, #08110c, #060b08);
      color:#fff;
      padding:20px;
    }

    .container{
      max-width:1100px;
      margin:auto;
    }

    h1{
      font-size:28px;
      margin-bottom:18px;
      letter-spacing:-.02em;
    }

    .card{
      background:rgba(15,29,21,.92);
      padding:20px;
      border-radius:20px;
      margin-bottom:20px;
      border:1px solid rgba(255,255,255,0.08);
      box-shadow:0 18px 40px rgba(0,0,0,.22);
      backdrop-filter:blur(12px);
    }

    .card h2{
      font-size:20px;
      margin-bottom:14px;
    }

    input, select{
      width:100%;
      padding:14px 15px;
      margin-top:10px;
      margin-bottom:14px;
      border:none;
      border-radius:12px;
      background:#16251d;
      color:white;
      outline:none;
      border:1px solid rgba(255,255,255,.06);
    }

    input::placeholder{
      color:rgba(255,255,255,.55);
    }

    input:focus, select:focus{
      border-color:rgba(22,163,74,.55);
      box-shadow:0 0 0 3px rgba(22,163,74,.12);
    }

    button{
      padding:12px 18px;
      border:none;
      border-radius:12px;
      background:#16a34a;
      color:white;
      font-weight:bold;
      cursor:pointer;
      transition:.2s ease;
    }

    button:hover{
      filter:brightness(1.05);
      transform:translateY(-1px);
    }

    button:disabled{
      opacity:.65;
      cursor:not-allowed;
      transform:none;
    }

    .muted{
      color:rgba(255,255,255,.72);
      font-size:13px;
      line-height:1.6;
      margin-top:6px;
    }

    .top-note{
      margin-bottom:16px;
      padding:14px 16px;
      border-radius:16px;
      background:rgba(22,163,74,.10);
      border:1px solid rgba(22,163,74,.18);
      color:#dff7e7;
      line-height:1.6;
      font-size:14px;
    }

    .news-grid{
      display:grid;
      grid-template-columns:repeat(auto-fit, minmax(240px, 1fr));
      gap:16px;
      margin-top:10px;
    }

    .item-card{
      overflow:hidden;
      border-radius:18px;
      background:#16251d;
      border:1px solid rgba(255,255,255,.08);
      box-shadow:0 12px 28px rgba(0,0,0,.16);
    }

    .item-card img{
      width:100%;
      height:220px;
      object-fit:cover;
      display:block;
      background:#0b0f0d;
    }

    .item-body{
      padding:14px;
    }

    .item-body h3{
      margin-bottom:10px;
      font-size:17px;
      line-height:1.5;
      color:#fff;
      word-break:break-word;
    }

    .item-actions{
      display:flex;
      gap:10px;
      flex-wrap:wrap;
    }

    .delete-btn{
      background:#dc2626;
    }

    .empty-state{
      padding:18px;
      border-radius:16px;
      background:rgba(255,255,255,.04);
      border:1px dashed rgba(255,255,255,.12);
      color:rgba(255,255,255,.72);
      text-align:center;
      line-height:1.7;
    }

    .row{
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:14px;
    }

    .small{
      font-size:12px;
      opacity:.8;
      margin-top:-8px;
      margin-bottom:10px;
      line-height:1.5;
    }

    @media (max-width: 768px){
      .row{
        grid-template-columns:1fr;
      }
    }

    @media (max-width: 640px){
      body{ padding:14px; }
      h1{ font-size:24px; }
      .card{ padding:16px; border-radius:18px; }
      .news-grid{ gap:14px; }
      .item-card img{ height:200px; }
    }
  </style>
</head>

<body>
  <div class="container">
    <h1>Kelola Konten Pondok</h1>

  
    <div class="card">
      <h2>Tambah Konten</h2>

      <div class="row">
        <div>
          <select id="kategori">
            <option value="berita">Berita</option>
            <option value="galeri">Galery</option>
            <option value="profil">Profil</option>
            <option value="visi-misi">Visi Misi</option>
            <option value="kurikulum">Kurikulum</option>
            <option value="ppdb">PPDB</option>
          </select>
          <div class="small">Pilih collection yang mau diisi.</div>
        </div>

        <div>
          <input type="text" id="judul" placeholder="Judul konten" />
         
        </div>
      </div>

      <input type="file" id="gambar" accept="image/*" />

      <button id="saveBtn">Simpan Konten</button>
      <div class="muted">Wajib isi judul dan gambar. File gambar akan disimpan ke Storage.</div>
    </div>

    <div class="card">
      <h2>Daftar Konten</h2>
      <div class="small" id="currentInfo">Menampilkan: Berita</div>
    
      <div id="kontenList" class="news-grid"></div>
    </div>
  </div>


  <script type="module">
  // 1. Hubungkan ke file firebase.js yang ada di folder asset
  import { db } from "./assets/js/firebase.js";
  
  // 2. Ambil fungsi untuk CRUD dari Firebase
  import { collection, addDoc, serverTimestamp, query, orderBy, onSnapshot } from "https://www.gstatic.com/firebasejs/10.x/firebase-firestore.js";

  // Tangkap elemen HTML Admin
  const btnSave = document.getElementById('saveBtn');
  const inputKategori = document.getElementById('kategori');
  const inputJudul = document.getElementById('judul');
  const inputGambar = document.getElementById('gambar');
  
  const kontenList = document.getElementById('kontenList');
  const currentInfo = document.getElementById('currentInfo');

  // ==========================================
  // FITUR 1: UPLOAD KE CLOUDINARY & SIMPAN KE FIREBASE
  // ==========================================
  btnSave.addEventListener('click', async () => {
    const file = inputGambar.files[0];
    const judul = inputJudul.value;
    const kategori = inputKategori.value; // Nilai ini: berita, galeri, dll.

    // Validasi sederhana
    if (!file || !judul) {
      return alert("Judul dan gambar wajib diisi!");
    }

    try {
      // Ubah status tombol
      btnSave.innerText = "Sedang Mengupload...";
      btnSave.disabled = true;

      // --- A: Upload ke Cloudinary ---
      const formData = new FormData();
      formData.append('file', file);
      formData.append('upload_preset', 'admin_upload'); // Preset kamu
      formData.append('cloud_name', 'dntmeiqhg');       // Cloud Name kamu

      const cloudResponse = await fetch('https://api.cloudinary.com/v1_1/dntmeiqhg/image/upload', {
        method: 'POST',
        body: formData
      });
      
      const cloudData = await cloudResponse.json();
      const URLCloudinary = cloudData.secure_url;

      // --- B: Simpan ke Firebase ---
      // collection(db, kategori) artinya gambar akan disimpan ke folder 'berita', 'galeri', dll sesuai pilihan dropdown
      await addDoc(collection(db, kategori), {
        title: judul,
        image_url: URLCloudinary,
        createdAt: serverTimestamp()
      });

      alert("Selesai! Konten berhasil ditambahkan.");
      
      // Bersihkan form setelah sukses
      inputJudul.value = "";
      inputGambar.value = "";
      btnSave.innerText = "Simpan Konten";
      btnSave.disabled = false;

    } catch (error) {
      console.error("Gagal memproses:", error);
      alert("Terjadi kesalahan sistem.");
      btnSave.innerText = "Simpan Konten";
      btnSave.disabled = false;
    }
  });

  // ==========================================
  // FITUR 2: MENAMPILKAN DAFTAR KONTEN OTOMATIS
  // ==========================================
  // Fungsi ini membaca data dari Firebase berdasarkan dropdown kategori yang dipilih
  function loadDaftarKonten() {
    const kategori = inputKategori.value;
    const namaKategori = inputKategori.options[inputKategori.selectedIndex].text;
    currentInfo.innerText = `Menampilkan: ${namaKategori}`;

    const q = query(collection(db, kategori), orderBy("createdAt", "desc"));
    
    // onSnapshot membuat data langsung tampil tanpa refresh
    onSnapshot(q, (snapshot) => {
      kontenList.innerHTML = ""; 

      if (snapshot.empty) {
        kontenList.innerHTML = `<div class="empty-state">Belum ada data di kategori ${namaKategori}.</div>`;
        return;
      }

      snapshot.forEach((doc) => {
        const data = doc.data();
        
        // Render ke kotak-kotak desain HTML-mu
        const cardHtml = `
          <div class="item-card">
            <img src="${data.image_url}" alt="Gambar Konten">
            <div class="item-body">
              <h3>${data.title}</h3>
            </div>
          </div>
        `;
        kontenList.innerHTML += cardHtml;
      });
    });
  }

  // Panggil fungsi tampilkan konten saat halaman pertama kali dibuka
  loadDaftarKonten();

  // Panggil fungsi lagi jika admin mengganti pilihan dropdown (misal dari Berita ke Galeri)
  inputKategori.addEventListener('change', loadDaftarKonten);

</script>
</body>
</html>
