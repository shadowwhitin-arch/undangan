<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin Berita</title>

  <style>
    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family:Arial, sans-serif;
    }

    body{
      background:
        radial-gradient(circle at top, rgba(22,163,74,.18), transparent 28%),
        linear-gradient(180deg, #08110c, #060b08);
      color:#fff;
      padding:20px;
    }

    .container{
      max-width:1100px;
      margin:auto;
    }

    h1{
      font-size:28px;
      margin-bottom:18px;
      letter-spacing:-.02em;
    }

    .card{
      background:rgba(15,29,21,.92);
      padding:20px;
      border-radius:20px;
      margin-bottom:20px;
      border:1px solid rgba(255,255,255,0.08);
      box-shadow:0 18px 40px rgba(0,0,0,.22);
      backdrop-filter:blur(12px);
    }

    .card h2{
      font-size:20px;
      margin-bottom:14px;
    }

    input{
      width:100%;
      padding:14px 15px;
      margin-top:10px;
      margin-bottom:14px;
      border:none;
      border-radius:12px;
      background:#16251d;
      color:white;
      outline:none;
      border:1px solid rgba(255,255,255,.06);
    }

    input::placeholder{
      color:rgba(255,255,255,.55);
    }

    input:focus{
      border-color:rgba(22,163,74,.55);
      box-shadow:0 0 0 3px rgba(22,163,74,.12);
    }

    button{
      padding:12px 18px;
      border:none;
      border-radius:12px;
      background:#16a34a;
      color:white;
      font-weight:bold;
      cursor:pointer;
      transition:.2s ease;
    }

    button:hover{
      filter:brightness(1.05);
      transform:translateY(-1px);
    }

    button:disabled{
      opacity:.65;
      cursor:not-allowed;
      transform:none;
    }

    .muted{
      color:rgba(255,255,255,.72);
      font-size:13px;
      line-height:1.6;
      margin-top:6px;
    }

    .news-grid{
      display:grid;
      grid-template-columns:repeat(auto-fit, minmax(240px, 1fr));
      gap:16px;
      margin-top:10px;
    }

    .berita-item{
      overflow:hidden;
      border-radius:18px;
      background:#16251d;
      border:1px solid rgba(255,255,255,.08);
      box-shadow:0 12px 28px rgba(0,0,0,.16);
    }

    .berita-item img{
      width:100%;
      height:220px;
      object-fit:cover;
      display:block;
      background:#0b0f0d;
    }

    .berita-body{
      padding:14px;
    }

    .berita-body h3{
      margin-bottom:10px;
      font-size:17px;
      line-height:1.5;
      color:#fff;
      word-break:break-word;
    }

    .berita-actions{
      display:flex;
      gap:10px;
      flex-wrap:wrap;
    }

    .delete-btn{
      background:#dc2626;
    }

    .empty-state{
      padding:18px;
      border-radius:16px;
      background:rgba(255,255,255,.04);
      border:1px dashed rgba(255,255,255,.12);
      color:rgba(255,255,255,.72);
      text-align:center;
      line-height:1.7;
    }

    .top-note{
      margin-bottom:16px;
      padding:14px 16px;
      border-radius:16px;
      background:rgba(22,163,74,.10);
      border:1px solid rgba(22,163,74,.18);
      color:#dff7e7;
      line-height:1.6;
      font-size:14px;
    }

    @media (max-width: 640px){
      body{ padding:14px; }
      h1{ font-size:24px; }
      .card{ padding:16px; border-radius:18px; }
      .news-grid{ gap:14px; }
      .berita-item img{ height:200px; }
    }
  </style>
</head>

<body>
  <div class="container">
    <h1>Kelola Berita Pondok</h1>

    <div class="top-note">
      Format sekarang: <b>upload gambar + judul</b>. Data akan tersimpan ke Firebase Storage dan Firestore, lalu tampil otomatis di web publik.
    </div>

    <div class="card">
      <h2>Tambah Berita</h2>

      <input type="text" id="judul" placeholder="Judul berita" />
      <input type="file" id="gambar" accept="image/*" />

      <button id="saveBtn">Simpan Berita</button>
      <div class="muted">Kalau judul kosong atau gambar belum dipilih, data tidak akan disimpan.</div>
    </div>

    <div class="card">
      <h2>Daftar Berita</h2>
      <div id="beritaList" class="news-grid"></div>
    </div>
  </div>

  <script type="module">
    import { db, storage } from "./firebase.js";

    import {
      collection,
      addDoc,
      deleteDoc,
      doc,
      query,
      orderBy,
      onSnapshot,
      serverTimestamp
    } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

    import {
      ref,
      uploadBytes,
      getDownloadURL
    } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-storage.js";

    const saveBtn = document.getElementById("saveBtn");
    const beritaList = document.getElementById("beritaList");
    const judulInput = document.getElementById("judul");
    const gambarInput = document.getElementById("gambar");

    function escapeHtml(text) {
      return String(text)
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#39;");
    }

    function formatTanggal(value) {
      if (!value) return "";

      const d = value.toDate ? value.toDate() : new Date(value);

      if (Number.isNaN(d.getTime())) return "";

      return new Intl.DateTimeFormat("id-ID", {
        day: "2-digit",
        month: "long",
        year: "numeric"
      }).format(d);
    }

    function renderEmptyState() {
      beritaList.innerHTML = `
        <div class="empty-state" style="grid-column:1 / -1;">
          Belum ada berita yang diupload.
          <br>
          Upload gambar dan judul dari form di atas, nanti akan muncul otomatis di sini.
        </div>
      `;
    }

    async function uploadGambar(file) {
      const fileName = `${Date.now()}-${file.name}`;
      const storageRef = ref(storage, `berita/${fileName}`);
      await uploadBytes(storageRef, file);
      return await getDownloadURL(storageRef);
    }

    const beritaQuery = query(
      collection(db, "berita"),
      orderBy("tanggal", "desc")
    );

    onSnapshot(
      beritaQuery,
      (snap) => {
        beritaList.innerHTML = "";

        if (snap.empty) {
          renderEmptyState();
          return;
        }

        snap.forEach((docSnap) => {
          const data = docSnap.data();

          const card = document.createElement("article");
          card.className = "berita-item";

          const img = document.createElement("img");
          img.src = data.gambar || "";
          img.alt = data.judul || "Berita Pondok";
          img.loading = "lazy";

          const body = document.createElement("div");
          body.className = "berita-body";

          const title = document.createElement("h3");
          title.innerHTML = escapeHtml(data.judul || "Tanpa Judul");

          const tanggal = document.createElement("div");
          tanggal.style.marginBottom = "10px";
          tanggal.style.fontSize = "12px";
          tanggal.style.opacity = "0.8";
          tanggal.textContent = formatTanggal(data.tanggal);

          const actions = document.createElement("div");
          actions.className = "berita-actions";

          const delBtn = document.createElement("button");
          delBtn.className = "delete-btn";
          delBtn.textContent = "Hapus";
          delBtn.dataset.id = docSnap.id;

          delBtn.addEventListener("click", async () => {
            const ok = confirm("Yakin mau hapus berita ini?");
            if (!ok) return;

            await deleteDoc(doc(db, "berita", docSnap.id));
          });

          body.appendChild(title);

          if (tanggal.textContent) {
            body.appendChild(tanggal);
          }

          actions.appendChild(delBtn);
          body.appendChild(actions);

          card.appendChild(img);
          card.appendChild(body);

          beritaList.appendChild(card);
        });
      },
      () => {
        renderEmptyState();
      }
    );

    saveBtn.addEventListener("click", async () => {
      const judul = judulInput.value.trim();
      const file = gambarInput.files[0];

      if (!judul || !file) {
        alert("Judul dan gambar wajib diisi.");
        return;
      }

      saveBtn.disabled = true;
      saveBtn.textContent = "Menyimpan...";

      try {
        const gambarURL = await uploadGambar(file);

        await addDoc(collection(db, "berita"), {
          judul: judul,
          gambar: gambarURL,
          tanggal: serverTimestamp()
        });

        judulInput.value = "";
        gambarInput.value = "";

        alert("Berita berhasil disimpan.");
      } catch (error) {
        console.error(error);
        alert("Gagal menyimpan berita.");
      } finally {
        saveBtn.disabled = false;
        saveBtn.textContent = "Simpan Berita";
      }
    });
  </script>
</body>
</html>
