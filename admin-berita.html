<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin Konten Pondok</title>

  <style>
    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family:Arial, sans-serif;
    }

    body{
      background:
        radial-gradient(circle at top, rgba(22,163,74,.18), transparent 28%),
        linear-gradient(180deg, #08110c, #060b08);
      color:#fff;
      padding:20px;
    }

    .container{
      max-width:1100px;
      margin:auto;
    }

    h1{
      font-size:28px;
      margin-bottom:18px;
      letter-spacing:-.02em;
    }

    .card{
      background:rgba(15,29,21,.92);
      padding:20px;
      border-radius:20px;
      margin-bottom:20px;
      border:1px solid rgba(255,255,255,0.08);
      box-shadow:0 18px 40px rgba(0,0,0,.22);
      backdrop-filter:blur(12px);
    }

    .card h2{
      font-size:20px;
      margin-bottom:14px;
    }

    input, select{
      width:100%;
      padding:14px 15px;
      margin-top:10px;
      margin-bottom:14px;
      border:none;
      border-radius:12px;
      background:#16251d;
      color:white;
      outline:none;
      border:1px solid rgba(255,255,255,.06);
    }

    input::placeholder{
      color:rgba(255,255,255,.55);
    }

    input:focus, select:focus{
      border-color:rgba(22,163,74,.55);
      box-shadow:0 0 0 3px rgba(22,163,74,.12);
    }

    button{
      padding:12px 18px;
      border:none;
      border-radius:12px;
      background:#16a34a;
      color:white;
      font-weight:bold;
      cursor:pointer;
      transition:.2s ease;
    }

    button:hover{
      filter:brightness(1.05);
      transform:translateY(-1px);
    }

    button:disabled{
      opacity:.65;
      cursor:not-allowed;
      transform:none;
    }

    .muted{
      color:rgba(255,255,255,.72);
      font-size:13px;
      line-height:1.6;
      margin-top:6px;
    }

    .top-note{
      margin-bottom:16px;
      padding:14px 16px;
      border-radius:16px;
      background:rgba(22,163,74,.10);
      border:1px solid rgba(22,163,74,.18);
      color:#dff7e7;
      line-height:1.6;
      font-size:14px;
    }

    .news-grid{
      display:grid;
      grid-template-columns:repeat(auto-fit, minmax(240px, 1fr));
      gap:16px;
      margin-top:10px;
    }

    .item-card{
      overflow:hidden;
      border-radius:18px;
      background:#16251d;
      border:1px solid rgba(255,255,255,.08);
      box-shadow:0 12px 28px rgba(0,0,0,.16);
    }

    .item-card img{
      width:100%;
      height:220px;
      object-fit:cover;
      display:block;
      background:#0b0f0d;
    }

    .item-body{
      padding:14px;
    }

    .item-body h3{
      margin-bottom:10px;
      font-size:17px;
      line-height:1.5;
      color:#fff;
      word-break:break-word;
    }

    .item-actions{
      display:flex;
      gap:10px;
      flex-wrap:wrap;
    }

    .delete-btn{
      background:#dc2626;
    }

    .empty-state{
      padding:18px;
      border-radius:16px;
      background:rgba(255,255,255,.04);
      border:1px dashed rgba(255,255,255,.12);
      color:rgba(255,255,255,.72);
      text-align:center;
      line-height:1.7;
    }

    .row{
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:14px;
    }

    .small{
      font-size:12px;
      opacity:.8;
      margin-top:-8px;
      margin-bottom:10px;
      line-height:1.5;
    }

    @media (max-width: 768px){
      .row{
        grid-template-columns:1fr;
      }
    }

    @media (max-width: 640px){
      body{ padding:14px; }
      h1{ font-size:24px; }
      .card{ padding:16px; border-radius:18px; }
      .news-grid{ gap:14px; }
      .item-card img{ height:200px; }
    }
  </style>
</head>

<body>
  <div class="container">
    <h1>Kelola Konten Pondok</h1>

  
    <div class="card">
      <h2>Tambah Konten</h2>

      <div class="row">
        <div>
          <select id="kategori">
            <option value="berita">Berita</option>
            <option value="galeri">Galeri</option>
            <option value="profil">Profil</option>
            <option value="visi-misi">Visi Misi</option>
            <option value="kurikulum">Kurikulum</option>
            <option value="ppdb">PPDB</option>
          </select>
          <div class="small">Pilih collection yang mau diisi.</div>
        </div>

        <div>
          <input type="text" id="judul" placeholder="Judul konten" />
         
        </div>
      </div>

      <input type="file" id="gambar" accept="image/*" />

      <button id="saveBtn">Simpan Konten</button>
      <div class="muted">Wajib isi judul dan gambar. File gambar akan disimpan ke Storage.</div>
    </div>

    <div class="card">
      <h2>Daftar Konten</h2>
      <div class="small" id="currentInfo">Menampilkan: Berita</div>
    
      <div id="kontenList" class="news-grid"></div>
    </div>
  </div>

 <script type="module">

import { db, storage } from "./assets/js/firebase.js";

import {
  collection,
  addDoc,
  deleteDoc,
  doc,
  query,
  orderBy,
  onSnapshot,
  serverTimestamp
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

import {
  ref,
  uploadBytes,
  getDownloadURL
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-storage.js";

    const kategoriEl = document.getElementById("kategori");
    const judulInput = document.getElementById("judul");
    const gambarInput = document.getElementById("gambar");
    const saveBtn = document.getElementById("saveBtn");
    const kontenList = document.getElementById("kontenList");
    const currentInfo = document.getElementById("currentInfo");

    const LABELS = {
      berita: "Berita",
      galeri: "Galeri",
      profil: "Profil",
      "visi-misi": "Visi Misi",
      kurikulum: "Kurikulum",
      ppdb: "PPDB"
    };

    let unsubscribeCurrent = null;

    function escapeHtml(text) {
      return String(text)
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#39;");
    }

    function formatTanggal(value) {
      if (!value) return "";
      const d = value.toDate ? value.toDate() : new Date(value);
      if (Number.isNaN(d.getTime())) return "";
      return new Intl.DateTimeFormat("id-ID", {
        day: "2-digit",
        month: "long",
        year: "numeric"
      }).format(d);
    }

    function renderEmptyState(label) {
      kontenList.innerHTML = `
        <div class="empty-state" style="grid-column:1 / -1;">
          Belum ada data pada <b>${label}</b>.
          <br>
          Upload gambar dan judul dari form di atas, nanti akan muncul otomatis di sini.
        </div>
      `;
    }

    async function uploadGambar(folder, file) {
      const fileName = `${Date.now()}-${file.name}`;
      const storagePath = `${folder}/${fileName}`;
      const storageRef = ref(storage, storagePath);

      await uploadBytes(storageRef, file);
      const downloadURL = await getDownloadURL(storageRef);

      return { downloadURL, storagePath };
    }

    function startListener() {
      const kategori = kategoriEl.value;
      const label = LABELS[kategori] || kategori;

      currentInfo.textContent = `Menampilkan: ${label}`;
      kontenList.innerHTML = "";

      if (unsubscribeCurrent) {
        unsubscribeCurrent();
        unsubscribeCurrent = null;
      }

      const q = query(
        collection(db, kategori),
        orderBy("tanggal", "desc")
      );

      unsubscribeCurrent = onSnapshot(
        q,
        (snap) => {
          kontenList.innerHTML = "";

          if (snap.empty) {
            renderEmptyState(label);
            return;
          }

          snap.forEach((docSnap) => {
            const data = docSnap.data();

            const card = document.createElement("article");
            card.className = "item-card";

            const img = document.createElement("img");
            img.src = data.gambar || "";
            img.alt = data.judul || label;
            img.loading = "lazy";

            const body = document.createElement("div");
            body.className = "item-body";

            const title = document.createElement("h3");
            title.innerHTML = escapeHtml(data.judul || "Tanpa Judul");

            const tanggal = document.createElement("div");
            tanggal.style.marginBottom = "10px";
            tanggal.style.fontSize = "12px";
            tanggal.style.opacity = "0.8";
            tanggal.textContent = formatTanggal(data.tanggal);

            const actions = document.createElement("div");
            actions.className = "item-actions";

            const delBtn = document.createElement("button");
            delBtn.className = "delete-btn";
            delBtn.textContent = "Hapus";

            delBtn.addEventListener("click", async () => {
              const ok = confirm(`Yakin mau hapus data ${label} ini?`);
              if (!ok) return;

              try {
                if (data.storagePath) {
                  await deleteObject(ref(storage, data.storagePath));
                }

                await deleteDoc(doc(db, kategori, docSnap.id));
                alert("Data berhasil dihapus.");
              } catch (error) {
                console.error(error);
                alert("Gagal menghapus data.");
              }
            });

            body.appendChild(title);

            if (tanggal.textContent) {
              body.appendChild(tanggal);
            }

            actions.appendChild(delBtn);
            body.appendChild(actions);

            card.appendChild(img);
            card.appendChild(body);

            kontenList.appendChild(card);
          });
        },
        () => {
          renderEmptyState(label);
        }
      );
    }

    kategoriEl.addEventListener("change", startListener);

    saveBtn.addEventListener("click", async () => {
      const kategori = kategoriEl.value;
      const judul = judulInput.value.trim();
      const file = gambarInput.files[0];

      if (!judul || !file) {
        alert("Judul dan gambar wajib diisi.");
        return;
      }

      saveBtn.disabled = true;
      saveBtn.textContent = "Menyimpan...";

      try {
        const { downloadURL, storagePath } = await uploadGambar(kategori, file);

        await addDoc(collection(db, kategori), {
          judul: judul,
          gambar: downloadURL,
          storagePath: storagePath,
          tanggal: serverTimestamp()
        });

        judulInput.value = "";
        gambarInput.value = "";

        alert("Data berhasil disimpan.");
      } catch (error) {
        console.error(error);
        alert("Gagal menyimpan data.");
      } finally {
        saveBtn.disabled = false;
        saveBtn.textContent = "Simpan Konten";
      }
    });

    startListener();
  </script>
</body>
</html>
